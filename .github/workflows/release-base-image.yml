name: Release devcontainer base image

# Builds and publishes ghcr.io/trimmi-de/devcontainer-base — the prebuilt image
# that bakes the trimmi-base feature (+ its python/rust/gh/claude graph and
# rtk/rtk-mcp/uv/aider) so consuming repos reference it via `image:` and skip the
# per-rebuild rtk-mcp compile.
#
# The build is reproducible: it resolves features from the committed
# base-image/.devcontainer/devcontainer-lock.json. To pull in newer feature
# releases (a new trimmi-base, python, etc.), refresh that lock deliberately:
#   devcontainer upgrade --workspace-folder base-image   # then commit + push

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "base-image/**"
      - ".github/workflows/release-base-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image
        id: build
        uses: devcontainers/ci@v0.3
        with:
          subFolder: base-image
          imageName: ghcr.io/trimmi-de/devcontainer-base
          imageTag: "1,latest"
          push: always
          cacheFrom: ghcr.io/trimmi-de/devcontainer-base

      - name: Sign image with cosign
        uses: sigstore/cosign-installer@v3.8.1
        with:
          cosign-release: 'v2.4.3'

      - name: Sign the published image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes ghcr.io/trimmi-de/devcontainer-base@${{ steps.build.outputs.digest }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.17.9
        with:
          image: ghcr.io/trimmi-de/devcontainer-base:1
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attach SBOM to image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign attach sbom --sbom sbom.spdx.json ghcr.io/trimmi-de/devcontainer-base@${{ steps.build.outputs.digest }}
